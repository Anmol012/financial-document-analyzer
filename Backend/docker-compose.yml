version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: financial_analyzer_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: financial_analyzer
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - financial_network

  redis:
    image: redis:7-alpine
    container_name: financial_analyzer_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - financial_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_analyzer_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=production
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/financial_analyzer?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-this}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - MAX_FILE_SIZE=104857600
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mongodb
      - redis
    networks:
      - financial_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_analyzer_celery_worker
    restart: always
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/financial_analyzer?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-this}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mongodb
      - redis
    networks:
      - financial_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_analyzer_celery_beat
    restart: always
    command: celery -A celery_app beat --loglevel=info
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/financial_analyzer?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    networks:
      - financial_network

  ollama:
    image: ollama/ollama:latest
    container_name: financial_analyzer_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - financial_network

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  ollama_data:

networks:
  financial_network:
    driver: bridge